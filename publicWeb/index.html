<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../api/alumnosAPI.js"></script>
    <script src="../api/profesoresAPI.js"></script>
    <script src="../api/tareasAPI.js"></script>
    <script src="../api/materiasAPI.js"></script>
    <script src="../controlRegistro/precargaAlumnos.js"></script>
    <script src="../controlRegistro/precargaProfesor.js"></script>

</head>
<body>
    <div id="particles-js"></div>
    <script src="../controlRegistro/shootingStar.js"></script>
    <div class="container">
        <h2>Bienvenido</h2>
        <button onclick="window.location.href='registroAlumno.html'">Registrarse como Alumno</button>
        <button onclick="window.location.href='registroProfesor.html'">Registrarse como Profesor</button>
        <hr>
        <p style="text-align:center;">¿Ya tienes cuenta?</p>
        <button onclick="window.location.href='login.html'">Ingresar</button>
    </div>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
    particlesJS('particles-js', {
        particles: {
            number: { value: 140, density: { enable: true, value_area: 800 } },
            color: { value: ['#ffffff', '#a78bfa', '#93c5fd', '#f0abfc'] },
            shape: { type: 'circle' },
            opacity: { value: 0.7, random: true, anim: { enable: true, speed: 0.4, opacity_min: 0.05, sync: false } },
            size: { value: 2.5, random: true },
            line_linked: { enable: false },
            move: { enable: true, speed: 0.4, direction: 'none', random: true, out_mode: 'out' }
        },
        interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'bubble' }, onclick: { enable: false } },
            modes: { bubble: { distance: 120, size: 5, duration: 2, opacity: 1 } }
        }
    });
    </script>
</body>
</html>
