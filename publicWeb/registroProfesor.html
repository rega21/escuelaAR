<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Profesor</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="particles-js"></div>
    <script src="../controlRegistro/shootingStar.js"></script>
    <div class="container">
        <h2>Registro de Profesor</h2>
        <form id="registroProfeForm">
            <label for="nombreProfe">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required autocomplete="username">
            <label for="passwordProfe">Contraseña:</label>
            <input type="password" id="passwordProfe" name="passwordProfe" required autocomplete="current-password">
            <label for="emailProfe">Email:</label>
            <input type="email" id="emailProfe" name="emailProfe" required autocomplete="email">
            <label for="materiaProfe">Materia:</label>
            <select id="materiaProfe" required style="width:100%; padding:8px; margin-bottom:15px;">
                <option value="">Seleccionar materia...</option>
            </select>
            <button type="submit">Registrarse</button>
            <button type="button" onclick="window.location.href='index.html'">Volver al inicio</button>
        </form>
        <div id="mensajeProfe"></div>
    </div>
    <script src="../api/profesoresAPI.js"></script>
    <script src="../api/materiasAPI.js"></script>
    <script src="../controlRegistro/registroProfesor.js"></script>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
    particlesJS('particles-js', {
        particles: {
            number: { value: 140, density: { enable: true, value_area: 800 } },
            color: { value: ['#ffffff', '#a78bfa', '#93c5fd', '#f0abfc'] },
            shape: { type: 'circle' },
            opacity: { value: 0.7, random: true, anim: { enable: true, speed: 0.4, opacity_min: 0.05, sync: false } },
            size: { value: 2.5, random: true },
            line_linked: { enable: false },
            move: { enable: true, speed: 0.4, direction: 'none', random: true, out_mode: 'out' }
        },
        interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'bubble' }, onclick: { enable: false } },
            modes: { bubble: { distance: 120, size: 5, duration: 2, opacity: 1 } }
        }
    });
    </script>
</body>
</html>
