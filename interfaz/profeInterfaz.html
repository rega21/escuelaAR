<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Profesor</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../api/alumnosAPI.js"></script>
    <script src="../api/profesoresAPI.js"></script>
    <script src="../api/tareasAPI.js"></script>
    <script src="../api/materiasAPI.js"></script>
    <script src="../controInterfaz/profeInterfaz.js"></script>
</head>
<body>
    <div class="container interfaz-profe">
        <div class="bienvenida-avatar">
            <span class="estado-online"><span class="dot-online"></span>En línea</span>
            <h2 id="bienvenidaProfe" style="margin:0;font-size:1.2rem;"></h2>
        </div>
        <p id="infoMateriaProfe"></p>

        <!-- Tabs -->
        <div class="tabs-profe">
            <button class="tab-btn activo" onclick="mostrarTab('tareas')">Tareas</button>
            <button class="tab-btn" onclick="mostrarTab('alumnos')">Alumnos</button>
        </div>

        <!-- Tab: Tareas -->
        <div id="tabTareas">
            <form id="formTarea">
                <label for="tituloTarea">Título de la tarea:</label>
                <input type="text" id="tituloTarea" required>
                <label for="descripcionTarea">Descripción de la tarea:</label>
                <textarea id="descripcionTarea" required></textarea>
                <label for="materiaTarea">Materia:</label>
                <input type="text" id="materiaTarea" readonly>
                <button type="submit">Agregar tarea</button>
            </form>
            <div id="mensajeTarea"></div>
            <ul id="listaTareasProfe"></ul>
        </div>

        <!-- Tab: Alumnos -->
        <div id="tabAlumnos" style="display:none;">
            <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
                <button type="button" onclick="actualizarAlumnos()">Actualizar alumnos</button>
            </div>
            <table id="tablaAlumnos"></table>
            <div id="historialAlumno"></div>
        </div>

        <button type="button" id="cerrSesionAlumno" onclick="window.location.href='../publicWeb/index.html'">Cerrar sesión</button>
    </div>
    
</body>
</html>
